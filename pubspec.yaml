name: cilicili
description: CiliCili - 一个第三方哔哩哔哩全平台客户端（参考 PiliPlus 架构）
publish_to: 'none'
version: 3.0.2+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # ===== 网络 =====
  dio: ^5.7.0
  http: ^1.2.2
  cookie_jar: ^4.0.8
  connectivity_plus: ^6.0.5

  # ===== 视频播放（对齐 PiliPlus 的 media_kit 方案） =====
  media_kit: ^1.1.11
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.5

  # ===== 弹幕渲染（对齐 PiliPlus 的 canvas_danmaku 方案） =====
  canvas_danmaku: ^0.1.1

  # ===== 状态/存储 =====
  provider: ^6.1.2
  shared_preferences: ^2.3.2

  # ===== UI/工具 =====
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  webview_flutter: ^4.10.0
  crypto: ^3.0.6
  path_provider: ^2.1.4
  share_plus: ^10.0.0
  permission_handler: ^11.3.0
  package_info_plus: ^8.0.0
  device_info_plus: ^11.1.0

  # ===== 系统能力（按需添加） =====
  # wakelock_plus: ^1.2.8          # 电视端可能不兼容
  # flutter_volume_controller: ^1.3.2  # 电视端可能不兼容
  # battery_plus: ^6.0.1            # 电视端可能不兼容

  # ===== 桌面端（按需添加） =====
  # window_manager: ^0.4.2          # 仅桌面端
  # tray_manager: ^0.2.3            # 仅桌面端

flutter:
  uses-material-design: true
  assets:
    - assets/
